# railway.toml — Configuration Railway pour Les Bâtisseurs Engagés
# À placer à la RACINE du projet (même niveau que package.json)

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install && pnpm build"

[deploy]
startCommand = "pnpm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Variables d'environnement à définir dans Railway Dashboard :
# DATABASE_URL      → URL MySQL (Railway MySQL plugin ou externe)
# JWT_SECRET        → Secret JWT min. 32 caractères
# NODE_ENV          → production
# PORT              → Railway injecte automatiquement $PORT
